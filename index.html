<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect</title>

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        button {
            padding: 12px 20px;
            background: #111;
            color: #fff;
            border: 1px solid #333;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            border-color: #00a8ff;
        }
    </style>
</head>
<body>

    <button id="btn-global">Buka Global Links</button>

    <script>
        const linkURL = "https://kuningminum.github.io/Kumin/Global%20Links.html";

        function pindah() {
            window.location.href = linkURL; // ganti tab sekarang
        }

        // tombol tetap ada
        document.getElementById("btn-global").addEventListener("click", pindah);

        // langsung pindah begitu halaman kebuka
        window.location.replace(linkURL);
    </script>

</body>
</html>
